name: StringTheory

# Source of truth for the Xcode project. Regenerate with `xcodegen generate`.
# The generated StringTheory.xcodeproj is gitignored.

options:
  bundleIdPrefix: com.javierorraca
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""          # TODO: set your Apple Developer Team ID for device/TestFlight builds
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES

packages:
  StringTheoryCore:
    path: StringTheoryCore

targets:
  StringTheory:
    type: application
    platform: iOS
    sources:
      - path: App/StringTheory
    dependencies:
      - package: StringTheoryCore
        product: StringTheoryCore
    info:
      path: App/StringTheory/Info.plist
      properties:
        CFBundleDisplayName: String Theory
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - SpaceGrotesk-Variable.ttf
          - HankenGrotesk-Variable.ttf
          - JetBrainsMono-Variable.ttf
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.javierorraca.stringtheory
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  StringTheoryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: App/StringTheoryTests
    dependencies:
      - target: StringTheory
      - package: StringTheoryCore
        product: StringTheoryCore

  StringTheoryUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: App/StringTheoryUITests
    dependencies:
      - target: StringTheory

schemes:
  StringTheory:
    build:
      targets:
        StringTheory: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - StringTheoryTests
        - StringTheoryUITests
