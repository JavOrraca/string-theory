name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core package tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Run swift test
        run: swift test --package-path StringTheoryCore

  app:
    name: App build and tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate the Xcode project
        run: xcodegen generate
      - name: Build and test
        # The simulator name must match one the runner has installed.
        # Run `xcrun simctl list devices available` locally or in a debug step
        # to pick a current device, and bump it when you change the runner image.
        run: |
          xcodebuild test \
            -project StringTheory.xcodeproj \
            -scheme StringTheory \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO
